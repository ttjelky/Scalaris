services:
  redis:
    image: redis:7-alpine
    container_name: scalaris-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    container_name: scalaris-postgres
    environment:
      POSTGRES_DB: scalaris_db
      POSTGRES_USER: scalaris_user
      POSTGRES_PASSWORD: scalaris_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: